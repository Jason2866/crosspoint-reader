; original platformio.ini
; RAM:   [===       ]  29.0% (used 95028 bytes from 327680 bytes)
; Flash: [========= ]  89.7% (used 5877767 bytes from 6553600 bytes)

; with optimizations for size and not needed features disabled, we can get down to:
; RAM:   [===       ]  26.7% (used 87412 bytes from 327680 bytes)
; Flash: [========  ]  83.8% (used 5488968 bytes from 6553600 bytes)


[platformio]
default_envs = default
build_cache_dir = .cache
extra_configs = platformio.local.ini

[crosspoint]
version = 1.1.0

[base]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform = https://github.com/pioarduino/platform-espressif32.git#develop
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

; Board configuration
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
; https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
; Enable LTO with HybridCompile is done with unflags -fno-lto
; Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
; Increase PNG scanline buffer to support up to 2048px wide images
; Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars

build_unflags =
                          -fno-lto

lib_ignore =
                          HTTPUpdateServer
                          USB
                          NetBIOS
                          Preferences
                          ArduinoOTA
                          ble
                          ESP32
                          ESP_SR
                          Ethernet
                          BluetoothSerial
                          spiffs
                          Matter
                          Zigbee
                          ESP RainMaker
                          LittleFS
                          Matter
                          OpenThread

custom_component_remove = 
                          espressif/esp_hosted
                          espressif/esp_wifi_remote
                          espressif/network_provisioning
                          espressif/esp_modem
                          espressif/esp32-camera
                          espressif/libsodium
                          espressif/esp-modbus
                          espressif/qrcode
                          espressif/esp_insights
                          espressif/esp_diag_data_store
                          espressif/esp_diagnostics
                          espressif/cbor
                          espressif/esp_rainmaker
                          espressif/rmaker_common
                          espressif/esp-zboss-lib
                          espressif/esp-zigbee-lib
                          espressif/esp_rainmaker
                          espressif/rmaker_common
                          chmorgan/esp-libhelix-mp3
                          joltwallet/littlefs

custom_sdkconfig        = 
                          CONFIG_APP_REPRODUCIBLE_BUILD=y
                          CONFIG_BOOTLOADER_LOG_LEVEL_NONE=y
                          CONFIG_BOOTLOADER_SKIP_VALIDATE_ALWAYS=y
                          CONFIG_BOOTLOADER_LOG_LEVEL_NONE=y
                          CONFIG_BOOT_ROM_LOG_ALWAYS_OFF=y
                          CONFIG_LOG_DEFAULT_LEVEL_NONE=y
                          CONFIG_ARDUHAL_LOG_DEFAULT_LEVEL_NONE=y
                          '# CONFIG_ARDUHAL_LOG_DEFAULT_LEVEL_ERROR is not set'
                          '# CONFIG_ARDUHAL_ESP_LOG is not set'
                          CONFIG_LOG_TAG_LEVEL_IMPL_NONE=y
                          CONFIG_APP_EXCLUDE_PROJECT_VER_VAR=y
                          CONFIG_APP_EXCLUDE_PROJECT_NAME_VAR=y
                          CONFIG_ADC_SUPPRESS_DEPRECATE_WARN=y
                          CONFIG_ADC_CALI_SUPPRESS_DEPRECATE_WARN=y
                          CONFIG_COMPILER_OPTIMIZATION_SIZE=y
                          CONFIG_COMPILER_OPTIMIZATION_ASSERTIONS_DISABLE=y
                          CONFIG_HAL_ASSERTION_DISABLE=y
                          '# CONFIG_COMPILER_CXX_EXCEPTIONS is not set'
                          '# CONFIG_ESP_ERR_TO_NAME_LOOKUP is not set'
                          CONFIG_COMPILER_OPTIMIZATION_CHECKS_SILENT=y
                          CONFIG_COMPILER_SAVE_RESTORE_LIBCALLS=y
                          CONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH=y
                          CONFIG_RINGBUF_PLACE_ISR_FUNCTIONS_INTO_FLASH=y
                          CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH=y
                          '# CONFIG_FREERTOS_DEBUG_OCDAWARE is not set'
                          '# CONFIG_FREERTOS_ENABLE_TASK_SNAPSHOT is not set'
                          CONFIG_ESP_COREDUMP_ENABLE_TO_NONE=y
                          CONFIG_LOG_TAG_LEVEL_IMPL_NONE=y
                          CONFIG_LWIP_LOCAL_HOSTNAME="xteink"
                          CONFIG_LIBC_NEWLIB_NANO_FORMAT=y
                          '# CONFIG_LWIP_ICMP is not set'
                          '# CONFIG_LOG_IN_IRAM is not set'
                          '# CONFIG_ESP_WIFI_IRAM_OPT is not set'
                          '# CONFIG_ESP_WIFI_RX_IRAM_OPT is not set'
                          '# CONFIG_ESP_WIFI_ENTERPRISE_SUPPORT is not set'
                          '# CONFIG_ESP_WIFI_ENABLE_WPA3_SAE is not set'
                          '# CONFIG_ESP_WIFI_ENABLE_SAE_H2E is not set'
                          '# CONFIG_ESP_WIFI_ENABLE_WPA3_OWE_STA is not set'
                          '# CONFIG_ESP_WIFI_FTM_ENABLE is not set'
                          '# CONFIG_ESP_WIFI_CSI_ENABLED is not set'
                          '# CONFIG_ESP_WIFI_11KV_SUPPORT is not set'
                          '# CONFIG_ESP_WIFI_RRM_SUPPORT is not set'
                          '# CONFIG_ESP_WIFI_WNM_SUPPORT is not set'
                          '# CONFIG_ESP_WIFI_SCAN_CACHE is not set'
                          '# CONFIG_ESP_WIFI_MBO_SUPPORT is not set'
                          '# CONFIG_ESP_WIFI_11R_SUPPORT is not set'
                          '# CONFIG_ESP_HTTPS_SERVER_ENABLE is not set'
                          '# CONFIG_ESP_HTTP_CLIENT_ENABLE_HTTPS is not set'
                          '# CONFIG_ESP_HTTP_CLIENT_ENABLE_BASIC_AUTH is not set'
                          '# CONFIG_RMT_ENCODER_FUNC_IN_IRAM is not set'
                          '# CONFIG_RMT_TX_ISR_HANDLER_IN_IRAM is not set'
                          '# CONFIG_RMT_RX_ISR_HANDLER_IN_IRAM is not set'
                          '# CONFIG_I2S_ISR_IRAM_SAFE is not set'
                          '# CONFIG_LOG_IN_IRAM is not set'
                          '# CONFIG_ESP_HW_SUPPORT_FUNC_IN_IRAM is not set'
                          '# CONFIG_ESP_PERIPH_CTRL_FUNC_IN_IRAM is not set'
                          '# CONFIG_ESP_REGI2C_CTRL_FUNC_IN_IRAM is not set'
                          '# CONFIG_GDMA_ISR_HANDLER_IN_IRAM is not set'
                          '# CONFIG_ESP_INTR_IN_IRAM is not set'
                          '# CONFIG_ESP_ROM_PRINT_IN_IRAM is not set'
                          '# CONFIG_ESP_TIMER_IN_IRAM is not set'
                          '# CONFIG_GDMA_OBJ_DRAM_SAFE is not set'
                          '# CONFIG_RMT_OBJ_CACHE_SAFE is not set'
                          '# CONFIG_ESP_DEBUG_OCDAWARE is not set'
                          '# CONFIG_ESP_GDBSTUB_ENABLED is not set'
                          '# CONFIG_LWIP_IPV6 is not set'
                          '# CONFIG_LWIP_IPV6_AUTOCONFIG is not set'
                          '# CONFIG_BT_ENABLED is not set'
                          '# CONFIG_BT_NIMBLE_ENABLED is not set'
                          '# CONFIG_BT_CONTROLLER_ENABLED is not set'
                          CONFIG_BT_CONTROLLER_DISABLED=y
                          '# CONFIG_LWIP_IP_FORWARD is not set'
                          '# CONFIG_LWIP_IPV4_NAPT is not set'
                          '# CONFIG_LWIP_IPV4_NAPT_PORTMAP is not set'
                          '# CONFIG_ETH_ENABLED is not set'
                          '# CONFIG_ETH_USE_SPI_ETHERNET is not set'
                          '# CONFIG_ETH_TRANSMIT_MUTEX is not set'
                          '# CONFIG_ETH_SPI_ETHERNET_DM9051 is not set'
                          '# CONFIG_ETH_SPI_ETHERNET_W5500 is not set'
                          '# CONFIG_ETH_SPI_ETHERNET_KSZ8851SNL is not set'
                          '# CONFIG_UNITY_ENABLE_FLOAT is not set'
                          '# CONFIG_UNITY_ENABLE_DOUBLE is not set'
                          '# CONFIG_UNITY_ENABLE_IDF_TEST_RUNNER is not set'
                          '# CONFIG_VFS_SUPPORT_SELECT is not set'
                          '# CONFIG_VFS_SUPPRESS_SELECT_DEBUG_OUTPUT is not set'
                          '# CONFIG_VFS_SUPPORT_TERMIOS is not set'

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/patch_jpegdec.py

; Libraries
lib_deps =
  https://github.com/Jason2866/x4-epaper-sdk/releases/latest/download/open-x4-sdk.zip
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.1.6
  bitbank2/JPEGDEC @ ^1.8.0
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-dev\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=0 ; Set log level to error for release builds  

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds  

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
  
